baseURL = 'http://example.org/'
languageCode = 'en-us'
title = 'Test site for mod-docs'

[module]
  # Build and serve using local mod-docs clone declared in the named Hugo workspace:
  workspace = "mod-docs.work"
  [[module.imports]]
    path = "github.com/gethinode/mod-docs"
  [[module.imports.mounts]]
    source = "dist"
    target = "static"
  [[module.imports.mounts]]
    source = "layouts"
    target = "layouts"